name: Build F-Droid Repo & Deploy Jekyll to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "45 2 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  # ---------------------------------------------------------
  # 1) F-Droid Repo generieren
  # ---------------------------------------------------------
  generate_fdroid_repo:
    name: "Generate F-Droid repo"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Create basic directory structure
        run: mkdir -p fdroid/repo

      - name: Restore correct mtime
        run: |
          sudo apt install git-restore-mtime
          git restore-mtime

      - name: Install F-Droid server software
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-venv git

          sudo add-apt-repository -y ppa:fdroid/fdroidserver
          sudo apt-get update
          sudo apt-get install -y fdroidserver

          sudo apt-get remove -y python3-androguard || true

          python3 -m pip install --upgrade pip
          python3 -m pip install androguard==4.1.1

      - name: Set up repo secrets
        run: |
          echo "./fdroid/keystore.p12"
          echo "./fdroid/config.yml"

      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: '^1.17.0'

      - name: Run update script
        run: bash update.sh 2>&1
        env:
          GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}

  # ---------------------------------------------------------
  # 2) Jekyll Build
  # ---------------------------------------------------------
  build:
    name: "Build Jekyll site"
    runs-on: ubuntu-latest
    needs: generate_fdroid_repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./fdroid/repo
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # ---------------------------------------------------------
  # 3) Deployment
  # ---------------------------------------------------------
  deploy:
    name: "Deploy to GitHub Pages"
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
