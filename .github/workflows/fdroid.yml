name: Generate F-Droid repo

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
  - cron: "45 2 * * *"

jobs:
  apps:
    name: "Generate repo from apps listing"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Create basic directory structure
        run: mkdir -p fdroid/repo

      - name: Restore correct mtime
        run: |
          sudo apt install git-restore-mtime 
          git restore-mtime

      - name: Install F-Droid server software
        run: |
         sudo add-apt-repository ppa:fdroid/fdroidserver
         sudo apt-get update
         sudo apt-get install fdroidserver

      - name: Set up repo secrets
        run: |
          echo ./fdroid/keystore.p12
          echo ./fdroid/config.yml


  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Read repo list
        id: set-matrix
        run: |
          repos=$(cat repos.txt | sed '/^\s*$/d')
          json="["
          for r in $repos; do
            json="$json\"$r\","
          done
          json="${json%,}]"
          echo "matrix=$json" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout Android repo
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          path: app

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd app
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Collect APK
        run: |
          mkdir -p output
          cp app/app/build/outputs/apk/release/*.apk output/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.repo }}-apk
          path: output/*.apk