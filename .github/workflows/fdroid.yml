name: Build F-Droid Repo & Deploy Jekyll to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  build_fdroid:
    name: "Build F-Droid Repo"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # CACHING
      # ---------------------------------------------------------

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ~/android-sdk
          key: android-sdk-cache

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-cache

      # ---------------------------------------------------------
      # Install dependencies
      # ---------------------------------------------------------

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget unzip imagemagick aapt yq

      - name: Install fdroidserver
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install fdroidserver androguard==4.1.1

      - name: Install Android SDK (for apksigner)
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          
          rm -rf latest
          rm -rf cmdline-tools-temp
          
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          
          unzip tools.zip -d cmdline-tools-temp
          
          mv cmdline-tools-temp/cmdline-tools latest
          
          yes | latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "build-tools;34.0.0"

      - name: Add aapt to PATH
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH

      # ---------------------------------------------------------
      # Build Jekyll site
      # ---------------------------------------------------------

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./fdroid/repo
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build_fdroid

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
