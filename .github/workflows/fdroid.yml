name: Build F-Droid Repo & Deploy Jekyll to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  build_fdroid:
    name: "Build F-Droid Repo"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # CACHING
      # ---------------------------------------------------------

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ~/android-sdk
          key: android-sdk-cache

      - name: Cache fdroidserver
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-fdroidserver

      - name: Cache yq
        uses: actions/cache@v4
        with:
          path: /usr/bin/yq
          key: yq-cache

      # ---------------------------------------------------------
      # Install dependencies
      # ---------------------------------------------------------

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget unzip imagemagick aapt yq

      - name: Install fdroidserver
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install fdroidserver androguard==4.1.1

      - name: Install Android SDK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME
          cd $ANDROID_HOME

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          mkdir -p cmdline-tools
          unzip tools.zip -d cmdline-tools-temp
          mkdir -p cmdline-tools/latest
          mv cmdline-tools-temp/cmdline-tools/* cmdline-tools/latest/

          yes | cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "build-tools;34.0.0"

      - name: Add aapt to PATH
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH

      # ---------------------------------------------------------
      # Clone upstream repos from apps.yml
      # ---------------------------------------------------------

      - name: Clone upstream repositories
        run: |
          set -e
          mkdir -p upstream

          echo "Reading apps.yml…"
          for appid in $(yq 'keys | .[]' $GITHUB_WORKSPACE/apps.yml); do
            repo_url=$(yq ".\"$appid\".git" $GITHUB_WORKSPACE/apps.yml)
            echo "Cloning $appid from $repo_url"
            git clone --depth=1 "$repo_url" "upstream/$appid"
          done

      # ---------------------------------------------------------
      # Copy Fastlane metadata
      # ---------------------------------------------------------

      - name: Copy Fastlane metadata
        run: |
          set -e
          mkdir -p fdroid/metadata

          for apk in fdroid/repo/*.apk; do
            [ -e "$apk" ] || continue

            appid=$(aapt dump badging "$apk" | grep package:\ name | cut -d"'" -f2)

            if [ -z "$appid" ]; then
              echo "ERROR: Could not extract appid from $apk"
              continue
            fi

            meta_dir="fdroid/metadata/$appid"
            mkdir -p "$meta_dir"

            if [ -d "upstream/$appid/fastlane" ]; then
              rsync -av --ignore-existing "upstream/$appid/fastlane/" "$meta_dir/fastlane/"
            fi
          done

      # ---------------------------------------------------------
      # Import Fastlane descriptions
      # ---------------------------------------------------------

      - name: Import Fastlane descriptions
        run: |
          set -e

          for apk in fdroid/repo/*.apk; do
            [ -e "$apk" ] || continue

            appid=$(aapt dump badging "$apk" | grep package:\ name | cut -d"'" -f2)
            meta_dir="fdroid/metadata/$appid"
            fastlane_dir="$meta_dir/fastlane/metadata/android"

            rm -f "$meta_dir/summary.txt"
            rm -f "$meta_dir/description.txt"

            locales="en-US en-GB en default"

            for loc in $locales; do
              if [ -f "$fastlane_dir/$loc/short_description.txt" ]; then
                cp "$fastlane_dir/$loc/short_description.txt" "$meta_dir/summary.txt"
                break
              fi
            done

            for loc in $locales; do
              if [ -f "$fastlane_dir/$loc/full_description.txt" ]; then
                cp "$fastlane_dir/$loc/full_description.txt" "$meta_dir/description.txt"
                break
              fi
            done
          done

      # ---------------------------------------------------------
      # Import Fastlane changelogs
      # ---------------------------------------------------------

      - name: Import Fastlane changelogs
        run: |
          set -e

          for apk in fdroid/repo/*.apk; do
            [ -e "$apk" ] || continue

            appid=$(aapt dump badging "$apk" | grep package:\ name | cut -d"'" -f2)
            meta_dir="fdroid/metadata/$appid"
            fastlane_dir="$meta_dir/fastlane/metadata/android"

            mkdir -p "$meta_dir/changelogs"

            locales="en-US en-GB en default"

            changelog_locale=""
            for loc in $locales; do
              if [ -d "$fastlane_dir/$loc/changelogs" ]; then
                changelog_locale="$fastlane_dir/$loc/changelogs"
                break
              fi
            done

            if [ -z "$changelog_locale" ]; then
              continue
            fi

            for file in "$changelog_locale"/*.txt; do
              version=$(basename "$file")
              cp "$file" "$meta_dir/changelogs/$version"
            done

            latest=$(ls "$changelog_locale" | sort -n | tail -n 1)
            cp "$changelog_locale/$latest" "$meta_dir/changelogs/default.txt"
          done

      # ---------------------------------------------------------
      # Extract icons
      # ---------------------------------------------------------

      - name: Extract icons
        run: |
          set -e

          for apk in fdroid/repo/*.apk; do
            [ -e "$apk" ] || continue

            appid=$(aapt dump badging "$apk" | grep package:\ name | cut -d"'" -f2)
            meta_dir="fdroid/metadata/$appid"
            upstream_res="upstream/$appid/app/src/main/res"

            densities="mipmap-xxxhdpi mipmap-xxhdpi mipmap-xhdpi mipmap-hdpi mipmap-mdpi"

            for d in $densities; do
              if [ -f "$upstream_res/$d/ic_launcher.png" ]; then
                cp "$upstream_res/$d/ic_launcher.png" "$meta_dir/icon.png"
                break
              fi
            done
          done

      # ---------------------------------------------------------
      # Build Jekyll site
      # ---------------------------------------------------------

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./fdroid/repo
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build_fdroid

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
