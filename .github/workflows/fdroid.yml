name: Build F-Droid Repo & Deploy Jekyll to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  generate_fdroid_repo:
    name: "Generate F-Droid repo"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Create basic directory structure
        run: mkdir -p fdroid/repo

      - name: Restore correct mtime
        run: |
          sudo apt install git-restore-mtime
          git restore-mtime

      - name: Install F-Droid server software
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-venv git openjdk-17-jdk wget unzip yq
          python3 -m pip install --upgrade pip
          python3 -m pip install fdroidserver androguard==4.1.1
      
      - name: Install Android SDK (for apksigner)
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME
          cd $ANDROID_HOME
      
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
      
          mkdir -p cmdline-tools
          unzip tools.zip -d cmdline-tools-temp
      
          mkdir -p cmdline-tools/latest
          mv cmdline-tools-temp/cmdline-tools/* cmdline-tools/latest/
      
          yes | cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "build-tools;34.0.0"

      - name: Set up repo secrets
        run: |
          echo "./fdroid/keystore.p12"
          echo "./fdroid/config.yml"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '^1.17.0'

      - name: Fix config.yml permissions
        run: chmod 600 fdroid/config.yml

      - name: Run update script
        run: bash update.sh 2>&1
        env:
          GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}

      # ---------------------------------------------------------
      # NEW: Clone all upstream repos from apps.yml
      # ---------------------------------------------------------
      - name: Clone all upstream repositories
        run: |
          set -e

          mkdir -p upstream

          echo "Reading apps.yml…"
          for appid in $(yq 'keys | .[]' apps.yml); do
            repo_url=$(yq ".\"$appid\".git" apps.yml)

            echo "Cloning $appid from $repo_url"
            git clone --depth=1 "$repo_url" "upstream/$appid"
          done

      # ---------------------------------------------------------
      # NEW: Fastlane pro App-ID übernehmen
      # ---------------------------------------------------------
      - name: Copy fastlane metadata per app-id
        run: |
          set -e

          echo "Scanning APKs…"
          for apk in fdroid/repo/*.apk; do
            [ -e "$apk" ] || continue

            # Extract app-id from APK
            appid=$(aapt dump badging "$apk" | grep package:\ name | cut -d"'" -f2)
            meta_dir="fdroid/metadata/$appid"

            echo "Processing $appid…"
            mkdir -p "$meta_dir"

            # Find matching upstream folder
            if [ -d "upstream/$appid/fastlane" ]; then
              echo "Found upstream/$appid/fastlane → copying…"

              rsync -av --ignore-existing "upstream/$appid/fastlane/" "$meta_dir/fastlane/"
            else
              echo "No fastlane folder for $appid"
            fi

            # Append release changelog
            mkdir -p "$meta_dir/changelogs"

            if [ -f "$meta_dir/changelogs/default.txt" ]; then
              echo -e "\n\n---\nUpstream Release Notes:\n" >> "$meta_dir/changelogs/default.txt"
              gh release view --repo "$(yq ".\"$appid\".git" apps.yml | sed 's|https://github.com/||')" --json body --jq .body >> "$meta_dir/changelogs/default.txt"
            else
              gh release view --repo "$(yq ".\"$appid\".git" apps.yml | sed 's|https://github.com/||')" --json body --jq .body > "$meta_dir/changelogs/default.txt"
            fi

          done
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}

  build:
    name: "Build Jekyll site"
    runs-on: ubuntu-latest
    needs: generate_fdroid_repo

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./fdroid/repo
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    name: "Deploy to GitHub Pages"
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
