name: Build F-Droid Repo Page & Deploy Jekyll to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  build_fdroid:
    name: "Build F-Droid Repo Page"
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------------
      # Build Jekyll site
      # ---------------------------------------------------------

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./fdroid/repo
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      # ---------------------------------------------------------
      # Deploy Jekyll site
      # ---------------------------------------------------------

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
