workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_ENABLE_MERGE_REQUEST_PIPELINES != "false"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push" && $CI_ENABLE_MERGE_REQUEST_PIPELINES != "false"
      when: never
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

stages:
  - prepare
  - build
  - test
  - report
  - deploy

variables:
  pip: pip3 --timeout 100 --retries 10
  GIT_DEPTH: "5000"
  CI_ENABLE_MERGE_REQUEST_PIPELINES: "true"

# --- Templates & Anchors ---

.debian-setup: &debian-setup
  - apt-get --allow-releaseinfo-change update
  - apt-get -qy dist-upgrade
  - apt-get install -qy --no-install-recommends ca-certificates git python3 curl

.install_fdroid_server: &install_fdroid_server
  - rm -rf $fdroidserver
  - mkdir -p $fdroidserver
  - curl --silent https://gitlab.com/fdroid/fdroidserver/-/archive/master/fdroidserver-master.tar.gz | tar -xz --directory=$fdroidserver --strip-components=1
  - export PATH="$fdroidserver:$PATH"
  - export PYTHONPATH="$fdroidserver:$fdroidserver/examples"
  - export PYTHONUNBUFFERED=true

.install_fdroid_server_deb: &install_fdroid_server_deb
  - *debian-setup
  - echo "locales locales/locales_to_be_generated multiselect en_US.UTF-8 UTF-8" | debconf-set-selections
  - apt-get install -qy --no-install-recommends fdroidserver apksigner mercurial git-svn brz python3-launchpadlib locales

.get_target_source_refs: &get_target_source_refs
  - |
    if [ "$CI_PROJECT_PATH" = "fdroid/fdroiddata" ] && [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        export TARGET_REF="${CI_COMMIT_BEFORE_SHA}"
        export SOURCE_REF="${CI_COMMIT_SHA}"
    else
        git remote add upstream https://gitlab.com/fdroid/fdroiddata.git || true
        git fetch upstream ${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-master}
        export TARGET_REF=$(git merge-base HEAD upstream/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-master})
        export SOURCE_REF="${CI_COMMIT_SHA}"
    fi

.get_changed_apps_logic: &get_changed_apps_logic
  - *get_target_source_refs
  - |
    for f in $(git diff --name-only --diff-filter=d "${TARGET_REF}...${SOURCE_REF}" -- metadata/*.yml metadata/*/signatures); do
        appid=$(echo "$f" | sed -E -n 's,^metadata/([^/][^/]*)(\.yml|/signatures/.*),\1,p')
        export CHANGED="$CHANGED $appid"
    done

.app_verification_rules:
  rules: &app_verification_rules
    - if: $CI_PIPELINE_SOURCE =~ /^(pipeline|schedule|trigger)$/
      when: never
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_ENABLE_MERGE_REQUEST_PIPELINES != "false"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - metadata/**/*
        - srclibs/**/*
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH

# --- Jobs ---

checkupdates:
  stage: test
  tags:
    - saas-linux-medium-amd64
  image: debian:bookworm-slim
  rules: *app_verification_rules
  before_script:
    - *install_fdroid_server_deb
    - export fdroidserver=../fdroidserver
    - *install_fdroid_server
  script:
    - chown -R $(whoami) .
    - *get_changed_apps_logic
    - |
      if [ -n "$CHANGED" ]; then
        fdroid checkupdates --auto -v $CHANGED
        git --no-pager diff --color=always --exit-code
      fi

fdroid lint:
  stage: test
  image: debian:bookworm-slim
  rules: *app_verification_rules
  before_script:
    - *install_fdroid_server_deb
    - export fdroidserver=$PWD/fdroidserver
    - *install_fdroid_server
  script:
    - chown -R $(whoami) .
    - cp tools/lint_config.yml config.yml
    - *get_changed_apps_logic
    - export EXITVALUE=0
    - |
      if [ -n "$CHANGED" ]; then
          fdroid rewritemeta $CHANGED;
          if ! git diff --exit-code > /dev/null; then
              export EXITVALUE=1
              printf "\nThese files have lint issues:\n"
              git diff --name-only
              printf "\nFormatting issues:\n"
              git --no-pager diff --color=always --ws-error-highlight=all | sed -e 's/\r/^M/' -e 's/%/%%/g'
          fi
      fi
    - exit $EXITVALUE

schema validation:
  stage: test
  image: python:3.11-slim
  rules: *app_verification_rules
  before_script:
    - pip install check-jsonschema
    - apt-get update && apt-get install -y git
  script:
    - chown -R $(whoami) .
    - check-jsonschema --check-metaschema schemas/metadata.json
    - *get_target_source_refs
    - |
      git diff --exit-code --name-only "${TARGET_REF}...${SOURCE_REF}" schemas/metadata.json || \
      { check-jsonschema --schemafile schemas/metadata.json metadata/*.yml || exit 1; }
    - *get_changed_apps_logic
    - |
      if [ -n "$CHANGED" ]; then
        echo $CHANGED | sed -En 's|([^ ]*)|metadata/\1.yml|gp' | xargs check-jsonschema --schemafile schemas/metadata.json
      fi

fdroid build:
  stage: build
  tags:
    - saas-linux-medium-amd64
  image: registry.gitlab.com/fdroid/fdroidserver:buildserver-bookworm
  artifacts:
    paths:
      - repo/
      - unsigned/
      - tmp/
    when: always
    expire_in: 1 month
  rules: *app_verification_rules
  cache:
    key: "$CI_JOB_NAME"
    paths:
      - .gradle
  variables:
    ANDROID_HOME: /opt/android-sdk
    ANDROID_SDK_ROOT: ${ANDROID_HOME}
  script:
    - chown -R $(whoami) .
    - *get_changed_apps_logic
    - test -n "$(echo "$CHANGED" | tr -d '[:space:]')" || exit 0
    - apt-get update && apt-get dist-upgrade -y
    - test -n "$fdroidserver" || source /etc/profile.d/bsenv.sh
    - sdkmanager "platform-tools" "build-tools;31.0.0"
    - *install_fdroid_server
    - curl --silent '<https://gitlab.com/fdroid/fdroid-bootstrap-buildserver/-/raw/master/roles/production_hardening/files/gitconfig>' >> ~/.gitconfig
    - APPS="$(./tools/find-changed-builds.py)"
    - |
      for build in $APPS; do
          apt-get install -y sudo
          appid=${build%:*}
          # ... (Logik für build-Prozess bleibt hier wie im Original, aber mit korrigierten Redirects)
          $fdroid build --verbose --test --refresh-scanner --scan-binary --on-server --no-tarball "$build"
      done

checkupdates_filter:
  image: debian:bookworm-slim
  stage: test
  rules:
    - if: $CI_PROJECT_PATH == 'FreetimeMaker/fdroid'
  script:
    - *debian-setup
    - chown -R $(whoami) .
    - git fetch https://gitlab.com/FreetimeMaker/fdroid.git
    - |
      if git diff --merge-base FETCH_HEAD HEAD --name-only | grep -v '^metadata/\S*\.yml$'; then
          printf "\x1b[31mERROR: Modifications to unauthorized paths! \x1b[0m\n"
          exit 1
      fi
